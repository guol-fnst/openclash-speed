port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
proxy-groups:
  - name: "🔰 节点选择"
    type: select
    proxies:
      - "新加坡 A"
      - "美国 B"
      - DIRECT
  - name: "其他组"
    type: select
    proxies:
      - DIRECT
proxies:
  - name: "新加坡 A"
    type: ss
    server: 192.0.2.1
    port: 443
    cipher: aes-128-gcm
    password: test
  - name: "美国 B"
    type: ss
    server: 192.0.2.2
    port: 443
    cipher: aes-128-gcm
    password: test
listeners:
  - name: unrelated
    type: mixed
    port: 7999
    listen: 127.0.0.1
rules:
  - DOMAIN,ads.example,🛑 全球拦截
  - DOMAIN-SUFFIX,youtube.com,旧媒体组
  - MATCH,DIRECT

